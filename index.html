<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PK WorkHub - Portfolio System</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Prompt', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .animate-fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-slide-up { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .spinner { border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top: 2px solid white; width: 18px; height: 18px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        
        @media print {
            @page { size: A4 portrait; margin: 15mm; }
            body { background-color: white !important; color: black !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .print-break-inside-avoid { break-inside: avoid; }
            .print\:hidden { display: none !important; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased overflow-hidden">
    <div id="root">
        <div class="flex items-center justify-center h-screen flex-col gap-4">
            <div class="w-10 h-10 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
            <p class="text-slate-500 font-medium animate-pulse">กำลังเตรียมระบบลงจอด...</p>
        </div>
    </div>

    <script type="text/babel">
        try {
            const { useState, useEffect, useMemo, useRef } = React;
            const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Treemap, ResponsiveContainer, Tooltip, Cell } = window.Recharts;

            // ==========================================
            // GAS WEB APP URL
            // ==========================================
            const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzWGA5YrSJ9r-IsVnawzM108aQvy5yRXcN42OjJPmihlQbaak92m2oqCTB7lIa3vi_UAg/exec";

            const Icon = ({ children, size = 22, className = "" }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
            );
            
            const Icons = {
                Dashboard: () => (<g><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></g>),
                Folder: () => (<path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"/>),
                File: () => (<g><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></g>),
                Search: () => (<g><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></g>),
                Plus: () => (<g><path d="M5 12h14"/><path d="M12 5v14"/></g>),
                Settings: () => (<g><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.38a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.72v-.51a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></g>),
                LogOut: () => (<g><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></g>),
                Trash: () => (<g><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></g>),
                Edit: () => (<path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>),
                Close: () => (<g><path d="M18 6 6 18"/><path d="m6 6 12 12"/></g>),
                External: () => (<g><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" x2="21" y1="14" y2="3"/></g>),
                Down: () => (<path d="m6 9 6 6 6-6"/>),
                Right: () => (<path d="m9 18 6-6-6-6"/>),
                Database: () => (<g><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></g>),
                Menu: () => (<g><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></g>),
                List: () => (<g><line x1="8" x2="21" y1="6" y2="6"/><line x1="8" x2="21" y1="12" y2="12"/><line x1="8" x2="21" y1="18" y2="18"/><line x1="3" x2="3.01" y1="6" y2="6"/><line x1="3" x2="3.01" y1="12" y2="12"/><line x1="3" x2="3.01" y1="18" y2="18"/></g>),
                Lock: () => (<g><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></g>),
                Check: () => (<polyline points="20 6 9 17 4 12"/>),
                Upload: () => (<g><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></g>),
                Image: () => (<g><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></g>),
                GridIcon: () => (<g><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></g>),
                Filter: () => (<polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>),
                Sort: () => (<g><line x1="11" y1="5" x2="21" y2="5"/><line x1="11" y1="9" x2="18" y2="9"/><line x1="11" y1="13" x2="15" y2="13"/><polyline points="3 17 7 21 11 17"/><line x1="7" y1="3" x2="7" y2="21"/></g>),
                Printer: () => (<g><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></g>),
                Lightbulb: () => (<g><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.9 1.2 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></g>),
                BarChart2: () => (<g><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></g>),
                LayoutTemplate: () => (<g><rect x="3" y="3" width="18" height="7" rx="2" ry="2"/><rect x="3" y="14" width="7" height="7" rx="2" ry="2"/><rect x="14" y="14" width="7" height="7" rx="2" ry="2"/></g>),
                Box: () => (<g><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></g>)
            };
            const Lucide = ({ icon, size, className }) => { const Comp = Icons[icon]; return Comp ? <Icon size={size} className={className}><Comp /></Icon> : null; };

            const Card = ({ children, className = "", onClick }) => (
                <div onClick={onClick} className={`bg-white rounded-2xl shadow-sm border border-slate-100/60 transition-all duration-300 ${className}`}>{children}</div>
            );

            const Badge = ({ type }) => {
                const colors = ['indigo', 'emerald', 'rose', 'amber', 'blue', 'purple', 'fuchsia'];
                const colorIdx = type.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0) % colors.length;
                const c = colors[colorIdx];
                return <span className={`text-xs font-semibold px-2.5 py-1 rounded-full border bg-${c}-50 text-${c}-700 border-${c}-200`}>{type}</span>;
            };

            const convertBase64 = (file) => new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = error => reject(error);
            });

            const COLORS = ['#6366f1', '#10b981', '#f59e0b', '#f43f5e', '#8b5cf6', '#3b82f6', '#14b8a6', '#f97316'];

            const TreemapContent = (props) => {
                const { x, y, width, height, index, name, size } = props;
                if (width < 30 || height < 30) return null;
                return (
                    <g>
                        <rect x={x} y={y} width={width} height={height} fill={COLORS[index % COLORS.length]} stroke="#ffffff" strokeWidth={3} rx={6} />
                        {width > 60 && height > 45 && (
                            <>
                                <text x={x + width / 2} y={y + height / 2 - 5} textAnchor="middle" fill="#fff" fontSize={14} fontWeight="bold" className="drop-shadow-sm">{name}</text>
                                <text x={x + width / 2} y={y + height / 2 + 15} textAnchor="middle" fill="#ffffff" fontSize={12} opacity={0.9}>{size} งาน</text>
                            </>
                        )}
                    </g>
                );
            };

            function App() {
                const [isAdmin, setIsAdmin] = useState(false);
                const [works, setWorks] = useState([]);
                const [categories, setCategories] = useState([]);
                const [types, setTypes] = useState([]);
                const [loading, setLoading] = useState(true);
                
                const [activeTab, setActiveTab] = useState('dashboard');
                
                // --- ระบบเมนูเปิดปิดที่ปรับปรุงใหม่ ---
                // เช็คหน้าจอตอนเริ่มต้น ถ้าจอเล็กให้ปิดเมนูไว้ก่อน ถ้าจอใหญ่ให้เปิด
                const [isSidebarOpen, setIsSidebarOpen] = useState(window.innerWidth >= 1024);
                
                const [expandedMenus, setExpandedMenus] = useState({ categories: true });
                const [showModal, setShowModal] = useState(false);
                const [currentWork, setCurrentWork] = useState(null);
                const [isSaving, setIsSaving] = useState(false);
                const [toast, setToast] = useState(null);
                
                const [selectedFile, setSelectedFile] = useState(null);
                const [previewImage, setPreviewImage] = useState(null);

                const [searchQuery, setSearchQuery] = useState('');
                const [selectedCategory, setSelectedCategory] = useState('All');
                const [selectedFilterType, setSelectedFilterType] = useState('All');
                const [sortBy, setSortBy] = useState('newest');
                const [viewMode, setViewMode] = useState('grid');

                const showToast = (message, type = 'success') => {
                    setToast({ message, type });
                    setTimeout(() => setToast(null), 3000);
                };

                const fetchData = async () => {
                    setLoading(true);
                    try {
                        const response = await fetch(GAS_WEB_APP_URL);
                        const data = await response.json();
                        const formattedWorks = (data.works || []).map(item => ({
                            ...item,
                            updatedAt: { seconds: new Date(item.updatedAt).getTime() / 1000 }
                        }));
                        setWorks(formattedWorks);
                        setCategories(data.categories || []);
                        setTypes(data.types || []);
                    } catch (error) {
                        showToast("ไม่สามารถโหลดข้อมูลได้", "error");
                    } finally {
                        setLoading(false);
                    }
                };

                useEffect(() => { fetchData(); }, []);

                // จัดการเรื่องการแสดงผลเมนูเวลาขยาย/ลดขนาดหน้าจอ
                useEffect(() => {
                    const handleResize = () => {
                        if (window.innerWidth >= 1024) {
                            setIsSidebarOpen(true);
                        } else {
                            setIsSidebarOpen(false);
                        }
                    };
                    window.addEventListener('resize', handleResize);
                    return () => window.removeEventListener('resize', handleResize);
                }, []);

                const handleLogin = (e) => {
                    e.preventDefault();
                    if (e.target.password.value === '1591') {
                        setIsAdmin(true); showToast("เข้าสู่ระบบ Admin เรียบร้อย"); setActiveTab('admin');
                    } else { showToast("รหัสผ่านไม่ถูกต้อง", "error"); }
                };

                const handleDeleteWork = async (id) => {
                    if (!confirm("คุณแน่ใจหรือไม่ว่าต้องการลบผลงานนี้?")) return;
                    const prevWorks = [...works];
                    setWorks(works.filter(w => w.id !== id));
                    try {
                        const res = await fetch(GAS_WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'delete', data: { id } }) });
                        const result = await res.json();
                        if (result.status === 'success') showToast("ลบข้อมูลสำเร็จ");
                        else throw new Error(result.message);
                    } catch (e) { setWorks(prevWorks); showToast(`ลบไม่สำเร็จ: ${e.message}`, "error"); }
                };

                const handleSaveWork = async (e) => {
                    e.preventDefault(); setIsSaving(true);
                    const formData = new FormData(e.target);
                    let imageFileData = null;
                    if (selectedFile) {
                        try { imageFileData = { base64: await convertBase64(selectedFile), mimeType: selectedFile.type, filename: selectedFile.name }; } 
                        catch (err) { showToast("Error reading image", "error"); setIsSaving(false); return; }
                    }
                    const dataPayload = {
                        id: currentWork?.id, title: formData.get('title'), category: formData.get('category'), 
                        type: formData.get('type'), url: formData.get('url'), description: formData.get('description'),
                        imageUrl: formData.get('imageUrl') || currentWork?.imageUrl || ''
                    };
                    try {
                        const res = await fetch(GAS_WEB_APP_URL, {
                            method: 'POST', body: JSON.stringify({ action: currentWork?.id ? 'update' : 'add', data: dataPayload, imageFile: imageFileData })
                        });
                        const result = await res.json();
                        if (result.status === 'success') { showToast("บันทึกสำเร็จ!"); setShowModal(false); fetchData(); }
                        else throw new Error(result.message);
                    } catch (e) { showToast(`บันทึกไม่สำเร็จ: ${e.message}`, "error"); } 
                    finally { setIsSaving(false); }
                };

                const handleSaveConfig = async (e) => {
                    e.preventDefault(); setIsSaving(true);
                    const newCats = e.target.categoriesText.value.split('\n').map(s => s.trim()).filter(String);
                    const newTypes = e.target.typesText.value.split('\n').map(s => s.trim()).filter(String);
                    try {
                        const res = await fetch(GAS_WEB_APP_URL, {
                            method: 'POST', body: JSON.stringify({ action: 'saveConfig', data: { categories: newCats, types: newTypes } })
                        });
                        const result = await res.json();
                        if (result.status === 'success') { setCategories(newCats); setTypes(newTypes); showToast("อัปเดตการตั้งค่าสำเร็จ!"); } 
                        else throw new Error(result.message);
                    } catch (e) { showToast(`อัปเดตไม่สำเร็จ: ${e.message}`, "error"); }
                    finally { setIsSaving(false); }
                };

                const processedWorks = useMemo(() => {
                    let result = works.filter(w => {
                        const s = searchQuery.toLowerCase();
                        const mSearch = w.title.toLowerCase().includes(s) || (w.description||'').toLowerCase().includes(s);
                        const mCat = selectedCategory === 'All' || w.category === selectedCategory;
                        const mType = selectedFilterType === 'All' || w.type === selectedFilterType;
                        return mSearch && mCat && mType;
                    });
                    return result.sort((a, b) => {
                        if (sortBy === 'newest') return b.updatedAt.seconds - a.updatedAt.seconds;
                        if (sortBy === 'oldest') return a.updatedAt.seconds - b.updatedAt.seconds;
                        if (sortBy === 'az') return a.title.localeCompare(b.title, 'th');
                        if (sortBy === 'za') return b.title.localeCompare(a.title, 'th');
                        return 0;
                    });
                }, [works, searchQuery, selectedCategory, selectedFilterType, sortBy]);

                const stats = useMemo(() => {
                    const catCount = {};
                    const typeCount = {};
                    works.forEach(w => {
                        catCount[w.category] = (catCount[w.category] || 0) + 1;
                        typeCount[w.type] = (typeCount[w.type] || 0) + 1;
                    });
                    
                    const catData = Object.keys(catCount).map(k => ({ name: k, value: catCount[k] })).sort((a,b)=>b.value-a.value);
                    const typeData = Object.keys(typeCount).map(k => ({ name: k, size: typeCount[k] })).sort((a,b)=>b.size-a.size);
                    
                    return { 
                        catData, 
                        typeData, 
                        total: works.length,
                        topCat: catData.length > 0 ? catData[0].name : '-',
                        topType: typeData.length > 0 ? typeData[0].name : '-'
                    };
                }, [works]);

                const handlePrint = () => { window.print(); };

                // เมื่อมีการคลิกเปลี่ยนเมนูบนมือถือ ให้ปิด Sidebar อัตโนมัติ
                const handleTabChange = (tab) => {
                    setActiveTab(tab);
                    if (window.innerWidth < 1024) setIsSidebarOpen(false);
                }

                return (
                    <>
                        {/* โหมดสำหรับ Print PDF (ถูกซ่อนในหน้าเว็บปกติ) */}
                        <div className="hidden print:block print:bg-white print:text-black w-full text-sm font-sans">
                            <div className="text-center mb-6 pb-4 border-b-2 border-slate-800">
                                <h1 className="text-2xl font-bold mb-2">รายงานสรุปแฟ้มสะสมผลงาน (Portfolio)</h1>
                                <h2 className="text-lg font-semibold">ผู้จัดทำ: ภก.พิชญ์พงศ์ (โรงพยาบาลจิตเวชเลยราชนครินทร์)</h2>
                                <p className="text-slate-600 mt-2">
                                    ข้อมูล ณ วันที่: {new Date().toLocaleDateString('th-TH')} | 
                                    หมวดหมู่ที่กรอง: {selectedCategory} | ประเภท: {selectedFilterType}
                                </p>
                            </div>
                            
                            <table className="w-full border-collapse border border-slate-300 mb-8">
                                <thead className="bg-slate-100">
                                    <tr>
                                        <th className="border border-slate-300 px-3 py-2 text-center w-12">ลำดับ</th>
                                        <th className="border border-slate-300 px-3 py-2 text-left">ชื่อผลงาน</th>
                                        <th className="border border-slate-300 px-3 py-2 text-center w-32">หมวดหมู่</th>
                                        <th className="border border-slate-300 px-3 py-2 text-center w-28">ประเภท</th>
                                        <th className="border border-slate-300 px-3 py-2 text-left">รายละเอียดการทำงาน</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {processedWorks.map((w, idx) => (
                                        <tr key={w.id} className="print-break-inside-avoid">
                                            <td className="border border-slate-300 px-3 py-3 text-center align-top">{idx + 1}</td>
                                            <td className="border border-slate-300 px-3 py-3 font-semibold align-top">{w.title}</td>
                                            <td className="border border-slate-300 px-3 py-3 text-center align-top">{w.category}</td>
                                            <td className="border border-slate-300 px-3 py-3 text-center align-top">{w.type}</td>
                                            <td className="border border-slate-300 px-3 py-3 align-top text-slate-700">{w.description || '-'}</td>
                                        </tr>
                                    ))}
                                    {processedWorks.length === 0 && (
                                        <tr><td colSpan="5" className="border border-slate-300 px-3 py-6 text-center text-slate-500">ไม่มีข้อมูลผลงานในหมวดหมู่นี้</td></tr>
                                    )}
                                </tbody>
                            </table>
                            
                            <div className="flex justify-between items-start mt-8 pt-4">
                                <div>
                                    <h3 className="font-bold text-base mb-2">สรุปจำนวนชิ้นงาน:</h3>
                                    <ul className="list-disc pl-5 space-y-1 text-slate-700">
                                        {categories.map(cat => {
                                            const count = processedWorks.filter(w => w.category === cat).length;
                                            return count > 0 ? <li key={cat}>{cat} : {count} ชิ้น</li> : null;
                                        })}
                                    </ul>
                                </div>
                                <div className="text-right border-t-2 border-slate-800 pt-2 min-w-[200px]">
                                    <p className="font-bold text-lg">รวมทั้งสิ้น: {processedWorks.length} ชิ้นงาน</p>
                                </div>
                            </div>
                        </div>

                        {/* โหมดแสดงผลหน้าเว็บปกติ */}
                        <div className="flex h-screen bg-slate-50 print:hidden overflow-hidden relative">
                            
                            {/* OVERLAY สำหรับมือถือ (แสดงขึ้นมาบังฉากหลังเวลาเปิดเมนู) */}
                            {isSidebarOpen && (
                                <div 
                                    className="fixed inset-0 bg-slate-900/50 z-30 lg:hidden backdrop-blur-sm transition-opacity"
                                    onClick={() => setIsSidebarOpen(false)}
                                ></div>
                            )}

                            {/* SIDEBAR */}
                            <aside className={`fixed lg:static inset-y-0 left-0 z-40 w-64 bg-slate-900 text-slate-300 flex flex-col shadow-2xl transition-transform duration-300 ease-in-out ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full lg:hidden'}`}>
                                <div className="p-6 flex items-center justify-between border-b border-slate-800">
                                    <div className="flex items-center space-x-3"><div className="bg-indigo-500 p-2 rounded-xl shadow-lg shadow-indigo-500/30"><Lucide icon="Box" className="text-white"/></div><div><h1 className="text-lg font-bold text-white tracking-wide">PK WorkHub</h1><p className="text-[10px] text-indigo-300 uppercase tracking-widest">Portfolio System</p></div></div>
                                    <button className="lg:hidden text-slate-400 hover:text-white" onClick={() => setIsSidebarOpen(false)}><Lucide icon="Close" size={20}/></button>
                                </div>
                                <nav className="flex-1 overflow-y-auto py-6 px-4 space-y-1">
                                    <button onClick={() => {handleTabChange('dashboard'); setSelectedCategory('All');}} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all ${activeTab==='dashboard'?'bg-indigo-600 text-white shadow-md':'hover:bg-slate-800 hover:text-white'}`}><Lucide icon="Dashboard" size={18}/><span className="font-medium">ภาพรวมระบบ</span></button>
                                    <button onClick={() => {handleTabChange('gallery'); setSelectedCategory('All');}} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all ${activeTab==='gallery'&&selectedCategory==='All'?'bg-indigo-600 text-white shadow-md':'hover:bg-slate-800 hover:text-white'}`}><Lucide icon="GridIcon" size={18}/><span className="font-medium">ผลงานทั้งหมด</span></button>
                                    
                                    <div className="pt-6 pb-2"><button onClick={() => setExpandedMenus(p => ({...p, categories: !p.categories}))} className="w-full flex justify-between items-center px-2 text-slate-500 hover:text-slate-300 uppercase text-[11px] font-bold tracking-wider"><span>หมวดหมู่ผลงาน</span><Lucide icon={expandedMenus.categories?"Down":"Right"} size={14}/></button></div>
                                    {expandedMenus.categories && <div className="space-y-1">
                                        {categories.map(cat => (
                                            <button key={cat} onClick={() => {setSelectedCategory(cat); handleTabChange('gallery');}} className={`w-full flex items-center space-x-3 px-4 py-2.5 rounded-lg text-sm transition-all ${selectedCategory===cat && activeTab==='gallery'?'bg-slate-800 text-indigo-400 font-medium':'text-slate-400 hover:bg-slate-800 hover:text-white'}`}><Lucide icon="Folder" size={16}/><span>{cat}</span></button>
                                        ))}
                                    </div>}
                                </nav>
                                <div className="p-4 border-t border-slate-800 bg-slate-900/50">
                                    {isAdmin ? 
                                        <div className="space-y-2">
                                            <div className="flex items-center space-x-2 px-2 text-emerald-400 text-xs font-medium mb-2"><div className="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></div><span>Admin Mode</span></div>
                                            <button onClick={() => handleTabChange('admin')} className={`w-full py-2.5 rounded-xl text-sm font-medium transition-colors flex items-center justify-center space-x-2 ${activeTab==='admin'?'bg-indigo-600 text-white':'bg-slate-800 hover:bg-slate-700 text-slate-300'}`}><Lucide icon="Database" size={16}/><span>จัดการผลงาน</span></button>
                                            <button onClick={() => handleTabChange('config')} className={`w-full py-2.5 rounded-xl text-sm font-medium transition-colors flex items-center justify-center space-x-2 ${activeTab==='config'?'bg-amber-600 text-white':'bg-slate-800 hover:bg-slate-700 text-slate-300'}`}><Lucide icon="Settings" size={16}/><span>ตั้งค่าระบบ</span></button>
                                            <button onClick={() => {setIsAdmin(false); handleTabChange('dashboard'); showToast("ออกจากระบบ");}} className="w-full text-slate-400 hover:text-rose-400 py-2 text-sm font-medium transition-colors flex items-center justify-center space-x-2 mt-2"><Lucide icon="LogOut" size={16}/><span>ออกจากระบบ</span></button>
                                        </div> 
                                        : <button onClick={() => handleTabChange('login')} className="w-full bg-indigo-600/10 hover:bg-indigo-600 hover:text-white text-indigo-400 border border-indigo-600/30 py-2.5 rounded-xl text-sm font-medium transition-all flex justify-center items-center space-x-2"><Lucide icon="Lock" size={16}/><span>Admin Login</span></button>
                                    }
                                </div>
                            </aside>

                            {/* MAIN CONTENT AREA */}
                            <div className="flex-1 flex flex-col h-screen overflow-hidden relative w-full">
                                
                                {/* HEADER */}
                                <header className="glass-panel z-20 border-b border-slate-200/50 px-4 md:px-6 py-4 flex justify-between items-center sticky top-0">
                                    <div className="flex items-center space-x-4">
                                        <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="p-2 -ml-2 rounded-xl hover:bg-slate-100 text-slate-600 transition-colors">
                                            <Lucide icon="Menu" size={24}/>
                                        </button>
                                        <h2 className="text-lg md:text-xl font-bold text-slate-800 tracking-tight hidden sm:block">{activeTab==='dashboard'?'ภาพรวม (Overview)':activeTab==='admin'?'จัดการข้อมูล':activeTab==='config'?'ตั้งค่าระบบ':activeTab==='login'?'เข้าสู่ระบบ':'คลังผลงาน'}</h2>
                                    </div>
                                    
                                    {activeTab !== 'login' && activeTab !== 'config' && (
                                        <div className="flex-1 max-w-md mx-2 md:mx-4 relative group">
                                            <Lucide icon="Search" className="absolute left-3.5 top-1/2 transform -translate-y-1/2 text-slate-400 w-4 h-4 group-focus-within:text-indigo-500 transition-colors"/>
                                            <input type="text" placeholder="ค้นหาชื่อผลงาน..." value={searchQuery} onChange={(e)=>setSearchQuery(e.target.value)} className="w-full pl-10 pr-4 py-2 bg-slate-100/80 md:py-2.5 border-transparent rounded-xl focus:bg-white focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500 outline-none text-sm transition-all shadow-sm"/>
                                        </div>
                                    )}

                                    <div className="flex items-center space-x-3">
                                        <div className="hidden md:flex flex-col items-end mr-1"><span className="text-sm font-bold text-slate-700">ภก.พิชญ์พงศ์</span><span className="text-xs text-indigo-600 font-medium">{isAdmin?'Administrator':'Pharmacist'}</span></div>
                                        <div className="w-9 h-9 md:w-10 md:h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 text-white flex items-center justify-center font-bold shadow-md shadow-indigo-200">P</div>
                                    </div>
                                </header>

                                <main className="flex-1 overflow-x-hidden overflow-y-auto p-4 md:p-6 lg:p-8 scroll-smooth relative">
                                    {loading ? (
                                        <div className="flex h-full items-center justify-center flex-col animate-fade-in"><div className="w-10 h-10 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin mb-4"></div><p className="text-slate-500">กำลังดึงข้อมูลจาก Google Sheet...</p></div>
                                    ) : activeTab === 'login' ? (
                                        <div className="flex items-center justify-center min-h-[70vh] animate-fade-in"><Card className="w-full max-w-md p-8 md:p-10 text-center border-t-4 border-t-indigo-500 mx-4"><div className="bg-indigo-50 w-20 h-20 rounded-2xl flex items-center justify-center mx-auto mb-6 text-indigo-600 shadow-inner"><Lucide icon="Lock" size={36}/></div><h2 className="text-2xl font-bold text-slate-800 mb-2">Admin Login</h2><p className="text-slate-500 mb-8 text-sm">ใส่รหัสผ่านเพื่อจัดการระบบ</p><form onSubmit={handleLogin} className="space-y-5"><input type="password" name="password" required placeholder="••••••••" className="w-full px-5 py-3 bg-slate-50 border border-slate-200 rounded-xl text-center tracking-[0.5em] font-bold text-lg outline-none focus:ring-2 focus:ring-indigo-500"/><button type="submit" className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl shadow-md transition-all hover:-translate-y-0.5">เข้าสู่ระบบ</button></form></Card></div>
                                    ) : activeTab === 'config' && isAdmin ? (
                                        <div className="max-w-4xl mx-auto space-y-6 animate-fade-in">
                                            <Card className="p-6 md:p-8"><div className="flex items-center space-x-3 mb-6 pb-4 border-b border-slate-100"><div className="p-3 bg-amber-50 text-amber-600 rounded-xl"><Lucide icon="Settings" size={24}/></div><div><h2 className="text-xl font-bold text-slate-800">ตั้งค่าหมวดหมู่และประเภท</h2><p className="text-sm text-slate-500">จัดการลิสต์ตัวเลือกที่จะแสดงในระบบ (ใส่ 1 รายการต่อ 1 บรรทัด)</p></div></div><form onSubmit={handleSaveConfig} className="space-y-6"><div className="grid grid-cols-1 md:grid-cols-2 gap-8"><div><label className="flex items-center text-sm font-bold text-slate-700 mb-2"><Lucide icon="Folder" size={16} className="mr-2 text-indigo-500"/> รายชื่อหมวดหมู่ (Categories)</label><textarea name="categoriesText" rows="10" defaultValue={categories.join('\n')} className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 resize-none leading-relaxed text-sm md:text-base"></textarea></div><div><label className="flex items-center text-sm font-bold text-slate-700 mb-2"><Lucide icon="Filter" size={16} className="mr-2 text-emerald-500"/> ประเภทผลงาน (Types)</label><textarea name="typesText" rows="10" defaultValue={types.join('\n')} className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500 resize-none leading-relaxed text-sm md:text-base"></textarea></div></div><div className="flex justify-end pt-4"><button type="submit" disabled={isSaving} className="w-full md:w-auto bg-slate-800 hover:bg-slate-900 text-white px-6 py-3 rounded-xl font-medium shadow-md flex items-center justify-center">{isSaving ? 'กำลังบันทึก...' : <><Lucide icon="Check" size={18} className="mr-2"/> บันทึกการตั้งค่า</>}</button></div></form></Card>
                                        </div>
                                    ) : activeTab === 'gallery' ? (
                                        <div className="space-y-6 animate-fade-in">
                                            {/* Toolbar หน้า Gallery รองรับมือถือเต็มรูปแบบ */}
                                            <div className="flex flex-col lg:flex-row justify-between items-start lg:items-center bg-white p-4 md:p-5 rounded-2xl shadow-sm border border-slate-100/60 gap-4">
                                                <div className="flex items-center w-full lg:w-auto">
                                                    <div className="p-2 bg-indigo-50 rounded-lg mr-3 text-indigo-600"><Lucide icon="Folder" size={20}/></div>
                                                    <h2 className="text-base md:text-lg font-bold text-slate-800 truncate">{selectedCategory === 'All' ? 'รวมผลงานทั้งหมด' : selectedCategory} <span className="ml-2 px-2.5 py-0.5 bg-slate-100 text-slate-500 text-sm rounded-full">{processedWorks.length}</span></h2>
                                                </div>
                                                <div className="flex flex-wrap items-center gap-2 md:gap-3 w-full lg:w-auto">
                                                    <div className="relative flex-1 md:flex-none items-center bg-slate-50 border border-slate-200 rounded-lg px-2 md:px-3 py-2 flex"><Lucide icon="Filter" size={14} className="text-slate-400 mr-1 md:mr-2 flex-shrink-0"/><select value={selectedFilterType} onChange={e=>setSelectedFilterType(e.target.value)} className="w-full bg-transparent text-xs md:text-sm font-medium text-slate-700 outline-none cursor-pointer appearance-none pr-4"><option value="All">ทุกประเภท</option>{types.map(t => <option key={t} value={t}>{t}</option>)}</select></div>
                                                    <div className="relative flex-1 md:flex-none items-center bg-slate-50 border border-slate-200 rounded-lg px-2 md:px-3 py-2 flex"><Lucide icon="Sort" size={14} className="text-slate-400 mr-1 md:mr-2 flex-shrink-0"/><select value={sortBy} onChange={e=>setSortBy(e.target.value)} className="w-full bg-transparent text-xs md:text-sm font-medium text-slate-700 outline-none cursor-pointer appearance-none pr-4"><option value="newest">ล่าสุด</option><option value="oldest">เก่าสุด</option><option value="az">ก - ฮ</option><option value="za">ฮ - ก</option></select></div>
                                                    <div className="flex bg-slate-100 p-1 rounded-lg flex-shrink-0"><button onClick={()=>setViewMode('grid')} className={`p-1 md:p-1.5 rounded-md transition-colors ${viewMode==='grid'?'bg-white shadow-sm text-indigo-600':'text-slate-400 hover:text-slate-600'}`}><Lucide icon="GridIcon" size={18}/></button><button onClick={()=>setViewMode('list')} className={`p-1 md:p-1.5 rounded-md transition-colors ${viewMode==='list'?'bg-white shadow-sm text-indigo-600':'text-slate-400 hover:text-slate-600'}`}><Lucide icon="List" size={18}/></button></div>
                                                    <div className="hidden sm:block pl-2 border-l border-slate-200 flex-shrink-0"><button onClick={handlePrint} className="flex items-center space-x-2 px-3 md:px-4 py-2 bg-slate-800 hover:bg-slate-700 text-white text-xs md:text-sm font-medium rounded-lg shadow-sm transition-colors"><Lucide icon="Printer" size={16}/><span className="hidden md:inline">พิมพ์รายงาน</span><span className="md:hidden">PDF</span></button></div>
                                                </div>
                                            </div>
                                            
                                            <button onClick={handlePrint} className="w-full sm:hidden flex justify-center items-center space-x-2 px-4 py-3 bg-slate-800 text-white font-medium rounded-xl shadow-sm mb-4"><Lucide icon="Printer" size={18}/><span>ส่งออกรายงาน (Export PDF)</span></button>

                                            {processedWorks.length === 0 ? (
                                                <div className="flex flex-col items-center justify-center py-20 text-slate-400 bg-white rounded-3xl border border-dashed border-slate-200"><Lucide icon="Search" size={48} className="mb-4 text-slate-300"/><p className="text-lg">ไม่พบผลงานที่ตรงกับเงื่อนไข</p></div>
                                            ) : viewMode === 'grid' ? (
                                                <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 md:gap-6">{processedWorks.map((work) => (<Card key={work.id} className="group flex flex-col h-full overflow-hidden hover:border-indigo-200 hover:shadow-lg cursor-pointer" onClick={() => window.open(work.url, '_blank')}><div className="h-40 md:h-48 bg-slate-100 relative overflow-hidden border-b border-slate-100">{work.imageUrl ? <img src={work.imageUrl} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" /> : <div className="w-full h-full flex flex-col items-center justify-center bg-gradient-to-br from-indigo-50 to-slate-100 text-indigo-300"><Lucide icon="Image" size={40} className="mb-2 opacity-50"/></div>}<div className="absolute top-3 right-3 md:top-4 md:right-4"><Badge type={work.type}/></div></div><div className="p-4 md:p-6 flex-1 flex flex-col relative"><div className="mb-2"><span className="text-[10px] font-bold text-indigo-500 bg-indigo-50 px-2 py-1 rounded-md uppercase tracking-wider">{work.category}</span></div><h3 className="text-base md:text-lg font-bold text-slate-800 mb-2 leading-snug group-hover:text-indigo-600 transition-colors">{work.title}</h3><p className="text-xs md:text-sm text-slate-500 line-clamp-2 mb-4 md:mb-6 flex-1 leading-relaxed">{work.description || 'ไม่มีคำอธิบายเพิ่มเติม'}</p><div className="mt-auto pt-4 border-t border-slate-100 flex items-center text-xs md:text-sm font-medium text-slate-400 group-hover:text-indigo-600 transition-colors"><span>เปิดดูผลงาน</span><Lucide icon="External" size={16} className="ml-2 transform group-hover:translate-x-1 group-hover:-translate-y-1 transition-transform"/></div></div></Card>))}</div>
                                            ) : (
                                                <Card className="overflow-hidden"><div className="overflow-x-auto"><table className="w-full text-sm text-left"><thead className="text-xs text-slate-500 uppercase bg-slate-50 border-b border-slate-100"><tr><th className="px-4 md:px-6 py-4 font-semibold">ภาพ</th><th className="px-4 md:px-6 py-4 font-semibold w-1/3 min-w-[200px]">ชื่อผลงาน / รายละเอียด</th><th className="px-4 md:px-6 py-4 font-semibold min-w-[100px]">หมวดหมู่</th><th className="px-4 md:px-6 py-4 font-semibold min-w-[100px]">ประเภท</th><th className="px-4 md:px-6 py-4 font-semibold text-right">เปิดดู</th></tr></thead><tbody className="divide-y divide-slate-100">{processedWorks.map(w => (<tr key={w.id} className="hover:bg-slate-50/80 transition-colors cursor-pointer" onClick={() => window.open(w.url, '_blank')}><td className="px-4 md:px-6 py-3">{w.imageUrl ? <img src={w.imageUrl} className="w-12 h-12 md:w-14 md:h-14 rounded-lg object-cover border border-slate-200" /> : <div className="w-12 h-12 md:w-14 md:h-14 rounded-lg bg-slate-100 flex items-center justify-center text-slate-300"><Lucide icon="Image" size={18}/></div>}</td><td className="px-4 md:px-6 py-4"><p className="font-bold text-slate-800 text-sm md:text-base mb-1">{w.title}</p><p className="text-slate-500 text-xs line-clamp-1">{w.description}</p></td><td className="px-4 md:px-6 py-4"><span className="text-[10px] md:text-xs font-bold text-indigo-500 bg-indigo-50 px-2 md:px-2.5 py-1 rounded-md whitespace-nowrap">{w.category}</span></td><td className="px-4 md:px-6 py-4"><Badge type={w.type}/></td><td className="px-4 md:px-6 py-4 text-right"><div className="inline-flex items-center justify-center w-8 h-8 rounded-full bg-slate-100 text-slate-400 hover:bg-indigo-100 hover:text-indigo-600 transition-colors"><Lucide icon="External" size={14}/></div></td></tr>))}</tbody></table></div></Card>
                                            )}
                                        </div>
                                    ) : (
                                        <div className="animate-fade-in space-y-6">
                                            {/* Stat Cards (รองรับมือถือ Grid จะปรับตัวอัตโนมัติ) */}
                                            <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-4 md:gap-6">
                                                <Card className="p-4 md:p-5 flex items-center space-x-4 border-l-4 border-indigo-500"><div className="p-2 md:p-3 bg-indigo-50 rounded-xl text-indigo-600"><Lucide icon="Database" size={24}/></div><div><p className="text-slate-500 text-[10px] md:text-xs font-medium uppercase tracking-wider">รวมผลงาน</p><h3 className="text-xl md:text-2xl font-bold text-slate-800">{stats.total} <span className="text-xs md:text-sm font-normal text-slate-500">ชิ้น</span></h3></div></Card>
                                                <Card className="p-4 md:p-5 flex items-center space-x-4 border-l-4 border-rose-500"><div className="p-2 md:p-3 bg-rose-50 rounded-xl text-rose-600"><Lucide icon="Pie" size={24}/></div><div><p className="text-slate-500 text-[10px] md:text-xs font-medium uppercase tracking-wider">หมวดหมู่หลัก</p><h3 className="text-base md:text-lg font-bold text-slate-800 truncate w-24 md:w-32">{stats.topCat}</h3></div></Card>
                                                <Card className="p-4 md:p-5 flex items-center space-x-4 border-l-4 border-amber-500"><div className="p-2 md:p-3 bg-amber-50 rounded-xl text-amber-600"><Lucide icon="LayoutTemplate" size={24}/></div><div><p className="text-slate-500 text-[10px] md:text-xs font-medium uppercase tracking-wider">รูปแบบที่ถนัด</p><h3 className="text-base md:text-lg font-bold text-slate-800">{stats.topType}</h3></div></Card>
                                                <Card className="p-4 md:p-5 flex items-center space-x-4 border-l-4 border-emerald-500"><div className="p-2 md:p-3 bg-emerald-50 rounded-xl text-emerald-600"><Lucide icon="Check" size={24}/></div><div><p className="text-slate-500 text-[10px] md:text-xs font-medium uppercase tracking-wider">อัปเดตล่าสุด</p><h3 className="text-sm md:text-base font-bold text-slate-800 mt-1">{works.length>0?new Date(Math.max(...works.map(e=>e.updatedAt?.seconds*1000||0))).toLocaleDateString('th-TH'):'-'}</h3></div></Card>
                                            </div>

                                            {stats.total > 0 && (
                                                <div className="bg-gradient-to-r from-indigo-50 via-blue-50 to-indigo-50/50 border border-indigo-100 rounded-2xl p-4 md:p-5 flex flex-col sm:flex-row items-start sm:items-center space-y-3 sm:space-y-0 sm:space-x-4 shadow-sm"><div className="p-3 bg-white rounded-full text-indigo-600 shadow-sm flex-shrink-0"><Lucide icon="Lightbulb" size={24}/></div><div><h4 className="font-bold text-slate-800 flex items-center text-sm md:text-base">ระบบวิเคราะห์ข้อมูล (AI Insight)</h4><p className="text-xs md:text-sm text-slate-600 mt-1 leading-relaxed">จากผลงานทั้งหมด <span className="font-bold text-indigo-600">{stats.total}</span> ชิ้น, คุณมีผลงานโดดเด่นในหมวดหมู่ <b>"{stats.topCat}"</b> มากที่สุด และมักนำเสนอในรูปแบบ <b>{stats.topType}</b></p></div></div>
                                            )}

                                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                                <Card className="p-4 md:p-6"><h3 className="text-base md:text-lg font-bold text-slate-800 mb-6 flex items-center"><div className="w-8 h-8 rounded-lg bg-indigo-50 text-indigo-600 flex items-center justify-center mr-3"><Lucide icon="BarChart2" size={18}/></div>จำนวนแยกตามหมวดหมู่</h3><div className="h-60 md:h-72">{stats.catData.length > 0 ? (<ResponsiveContainer width="100%" height="100%"><BarChart data={stats.catData} margin={{ top: 10, right: 10, left: -20, bottom: 0 }} layout="vertical"><CartesianGrid strokeDasharray="3 3" horizontal={false} stroke="#f1f5f9" /><XAxis type="number" hide /><YAxis dataKey="name" type="category" tick={{fontSize: 12, fill: '#64748b'}} axisLine={false} tickLine={false} width={90} /><Tooltip cursor={{fill: '#f8fafc'}} contentStyle={{borderRadius: '12px', border: 'none', boxShadow: '0 10px 15px -3px rgba(0,0,0,0.1)'}} /><Bar dataKey="value" radius={[0, 4, 4, 0]} barSize={24}>{stats.catData.map((entry, index) => (<Cell key={`cell-${index}`} fill={COLORS[index % COLORS.length]} />))}</Bar></BarChart></ResponsiveContainer>) : <div className="h-full flex items-center justify-center text-slate-400">ยังไม่มีข้อมูล</div>}</div></Card>
                                                <Card className="p-4 md:p-6"><h3 className="text-base md:text-lg font-bold text-slate-800 mb-6 flex items-center"><div className="w-8 h-8 rounded-lg bg-emerald-50 text-emerald-600 flex items-center justify-center mr-3"><Lucide icon="LayoutTemplate" size={18}/></div>สัดส่วนประเภทผลงาน</h3><div className="h-60 md:h-72">{stats.typeData.length > 0 ? (<ResponsiveContainer width="100%" height="100%"><Treemap data={stats.typeData} dataKey="size" aspectRatio={4/3} stroke="#fff" content={<TreemapContent />}><Tooltip contentStyle={{borderRadius: '12px', border: 'none', boxShadow: '0 10px 15px -3px rgba(0,0,0,0.1)'}} formatter={(value) => [`${value} ชิ้นงาน`, 'จำนวน']} /></Treemap></ResponsiveContainer>) : <div className="h-full flex items-center justify-center text-slate-400">ยังไม่มีข้อมูล</div>}</div></Card>
                                            </div>

                                            {activeTab === 'admin' ? (
                                                <Card className="overflow-hidden"><div className="p-4 md:p-5 border-b border-slate-100 flex flex-col sm:flex-row justify-between items-start sm:items-center bg-slate-50/50 gap-3"><h3 className="font-bold text-slate-800">จัดการข้อมูลผลงาน</h3><button onClick={() => {setCurrentWork(null); setSelectedFile(null); setPreviewImage(null); setShowModal(true);}} className="w-full sm:w-auto bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-all shadow-sm flex items-center justify-center"><Lucide icon="Plus" size={16} className="mr-2"/>เพิ่มผลงาน</button></div><div className="overflow-x-auto"><table className="w-full text-sm text-left"><thead className="text-xs text-slate-500 uppercase bg-slate-50"><tr><th className="px-4 md:px-6 py-4 font-semibold">ภาพ</th><th className="px-4 md:px-6 py-4 font-semibold min-w-[150px]">ชื่อผลงาน</th><th className="px-4 md:px-6 py-4 font-semibold min-w-[100px]">หมวดหมู่</th><th className="px-4 md:px-6 py-4 font-semibold">ประเภท</th><th className="px-4 md:px-6 text-center font-semibold">จัดการ</th></tr></thead><tbody className="divide-y divide-slate-100">{processedWorks.map(w => <tr key={w.id} className="hover:bg-slate-50/80 transition-colors"><td className="px-4 md:px-6 py-3">{w.imageUrl ? <img src={w.imageUrl} className="w-10 h-10 md:w-12 md:h-12 rounded object-cover border border-slate-200" /> : <div className="w-10 h-10 md:w-12 md:h-12 rounded bg-slate-100 flex items-center justify-center text-slate-300"><Lucide icon="Image" size={16}/></div>}</td><td className="px-4 md:px-6 py-4 font-medium text-slate-800">{w.title}</td><td className="px-4 md:px-6 py-4 text-slate-600"><span className="text-[10px] md:text-xs font-bold text-indigo-500 bg-indigo-50 px-2.5 py-1 rounded-md whitespace-nowrap">{w.category}</span></td><td className="px-4 md:px-6 py-4"><Badge type={w.type}/></td><td className="px-4 md:px-6 py-4"><div className="flex justify-center space-x-2 md:space-x-3"><button onClick={() => {setCurrentWork(w); setSelectedFile(null); setPreviewImage(w.imageUrl||null); setShowModal(true);}} className="p-1.5 md:p-2 text-indigo-600 hover:bg-indigo-50 rounded-lg transition-colors"><Lucide icon="Edit" size={18}/></button><button onClick={() => handleDeleteWork(w.id)} className="p-1.5 md:p-2 text-rose-600 hover:bg-rose-50 rounded-lg transition-colors"><Lucide icon="Trash" size={18}/></button></div></td></tr>)}</tbody></table></div></Card>
                                            ) : (
                                                <Card className="p-4 md:p-6"><h3 className="text-base md:text-lg font-bold text-slate-800 mb-4 flex items-center"><div className="w-8 h-8 rounded-lg bg-amber-50 text-amber-600 flex items-center justify-center mr-3"><Lucide icon="List" size={18}/></div>ผลงานที่เพิ่มล่าสุด</h3><div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">{works.slice(0,6).map(w=>(<div key={w.id} className="flex items-center p-3 md:p-4 hover:bg-slate-50 rounded-xl border border-slate-100 transition-colors group cursor-pointer shadow-sm md:shadow-none" onClick={()=>window.open(w.url,'_blank')}><div className={`w-10 h-10 md:w-12 md:h-12 rounded-xl flex items-center justify-center mr-3 md:mr-4 bg-indigo-50 text-indigo-600`}><Lucide icon="File" size={20}/></div><div className="flex-1 min-w-0"><p className="text-sm font-bold text-slate-800 truncate group-hover:text-indigo-600 transition-colors">{w.title}</p><p className="text-[10px] md:text-xs text-slate-500 mt-1">{w.category}</p></div><div className="w-7 h-7 md:w-8 md:h-8 rounded-full bg-white border border-slate-200 flex items-center justify-center text-slate-400 group-hover:border-indigo-200 group-hover:text-indigo-600 group-hover:bg-indigo-50 transition-all"><Lucide icon="Right" size={14}/></div></div>))}</div></Card>
                                            )}
                                        </div>
                                    )}
                                </main>
                            </div>
                        </div>

                        {/* Modal Form */}
                        {showModal && (
                            <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 sm:p-6 print:hidden">
                                <div className="absolute inset-0 bg-slate-900/50 backdrop-blur-sm transition-opacity" onClick={()=>!isSaving && setShowModal(false)}></div>
                                <div className="bg-white rounded-2xl shadow-2xl w-full max-w-2xl overflow-hidden relative z-10 animate-slide-up flex flex-col max-h-[95vh]">
                                    <div className="px-4 md:px-6 py-4 md:py-5 border-b border-slate-100 flex justify-between items-center bg-slate-50/80"><h3 className="text-lg md:text-xl font-bold text-slate-800 flex items-center"><Lucide icon={currentWork?"Edit":"Plus"} className="mr-2 text-indigo-600"/>{currentWork?'แก้ไขข้อมูลผลงาน':'เพิ่มผลงานใหม่'}</h3><button type="button" onClick={()=>!isSaving && setShowModal(false)} className="w-8 h-8 rounded-full flex items-center justify-center bg-slate-200/50 text-slate-500 hover:bg-rose-100 hover:text-rose-600 transition-colors"><Lucide icon="Close" size={18}/></button></div>
                                    <form onSubmit={handleSaveWork} className="p-4 md:p-6 overflow-y-auto flex-1">
                                        <div className="mb-4 md:mb-6"><label className="block text-sm font-semibold text-slate-700 mb-2">รูปภาพประกอบผลงาน</label><div className={`relative border-2 border-dashed rounded-xl p-4 flex flex-col items-center justify-center transition-all cursor-pointer ${previewImage ? 'border-indigo-300 bg-indigo-50/30' : 'border-slate-300 hover:border-indigo-400 hover:bg-slate-50'} min-h-[140px] md:min-h-[160px]`} onClick={() => document.getElementById('file-upload').click()}>{previewImage ? (<div className="relative w-full h-32 md:h-40"><img src={previewImage} className="w-full h-full object-contain rounded-lg" alt="Preview"/><div className="absolute inset-0 bg-black/40 opacity-0 hover:opacity-100 flex items-center justify-center rounded-lg transition-opacity"><span className="text-white font-medium text-sm flex items-center"><Lucide icon="Upload" size={16} className="mr-2"/>เปลี่ยนรูป</span></div></div>) : <div className="text-center"><div className="w-10 h-10 md:w-12 md:h-12 rounded-full bg-indigo-50 text-indigo-500 flex items-center justify-center mx-auto mb-2 md:mb-3"><Lucide icon="Image" size={20}/></div><p className="text-xs md:text-sm font-medium text-indigo-600">คลิกเพื่ออัปโหลดรูปภาพ</p></div>}<input id="file-upload" type="file" accept="image/*" onChange={(e)=>{if(e.target.files[0]){ setSelectedFile(e.target.files[0]); const r=new FileReader(); r.onload=()=>setPreviewImage(r.result); r.readAsDataURL(e.target.files[0]); }}} className="hidden" /></div></div>
                                        <div className="space-y-3 md:space-y-4 border-t border-slate-100 pt-4 md:pt-5"><div><label className="block text-sm font-semibold text-slate-700 mb-1.5">ชื่อผลงาน <span className="text-rose-500">*</span></label><input name="title" defaultValue={currentWork?.title} required className="w-full px-3 md:px-4 py-2 md:py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-indigo-500/50 outline-none text-sm md:text-base"/></div><div className="grid grid-cols-1 sm:grid-cols-2 gap-4 md:gap-5"><div><label className="block text-sm font-semibold text-slate-700 mb-1.5">หมวดหมู่</label><select name="category" defaultValue={currentWork?.category||categories[0]} className="w-full px-3 md:px-4 py-2 md:py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-indigo-500/50 outline-none text-sm md:text-base">{categories.map(c=><option key={c} value={c}>{c}</option>)}</select></div><div><label className="block text-sm font-semibold text-slate-700 mb-1.5">ประเภท</label><select name="type" defaultValue={currentWork?.type||types[0]} className="w-full px-3 md:px-4 py-2 md:py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-indigo-500/50 outline-none text-sm md:text-base">{types.map(t=><option key={t} value={t}>{t}</option>)}</select></div></div><div><label className="block text-sm font-semibold text-slate-700 mb-1.5">URL / Link <span className="text-rose-500">*</span></label><input name="url" defaultValue={currentWork?.url} type="url" required className="w-full px-3 md:px-4 py-2 md:py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-indigo-500/50 outline-none text-sm md:text-base"/></div><div><label className="block text-sm font-semibold text-slate-700 mb-1.5">รายละเอียด (ย่อ)</label><textarea name="description" defaultValue={currentWork?.description} rows="3" className="w-full px-3 md:px-4 py-2 md:py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-indigo-500/50 outline-none resize-none text-sm md:text-base"></textarea></div></div>
                                        <div className="pt-4 md:pt-6 mt-4 md:mt-6 flex space-x-2 md:space-x-3 border-t border-slate-100"><button type="button" onClick={()=>!isSaving && setShowModal(false)} className="flex-1 px-3 md:px-4 py-2.5 md:py-3 border border-slate-200 text-slate-600 font-medium rounded-xl hover:bg-slate-50 text-sm md:text-base" disabled={isSaving}>ยกเลิก</button><button type="submit" className="flex-1 px-3 md:px-4 py-2.5 md:py-3 bg-indigo-600 text-white font-medium rounded-xl hover:bg-indigo-700 flex justify-center items-center text-sm md:text-base" disabled={isSaving}>{isSaving ? <><div className="spinner mr-2"></div> กำลังทำงาน...</> : <><Lucide icon="Check" size={18} className="mr-2"/> บันทึก</>}</button></div>
                                    </form>
                                </div>
                            </div>
                        )}

                        {toast && (<div className="fixed bottom-4 right-4 md:bottom-6 md:right-6 z-[70] animate-slide-up print:hidden"><div className={`flex items-center space-x-3 px-4 md:px-5 py-3 md:py-3.5 rounded-xl shadow-xl border ${toast.type === 'error' ? 'bg-rose-50 border-rose-200 text-rose-700' : 'bg-slate-800 border-slate-700 text-white'}`}><div className={`p-1 rounded-full ${toast.type === 'error' ? 'bg-rose-200' : 'bg-emerald-500/20 text-emerald-400'}`}><Lucide icon={toast.type === 'error' ? 'Close' : 'Check'} size={14}/></div><p className="font-medium text-xs md:text-sm">{toast.message}</p></div></div>)}
                    </>
                );
            }
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        } catch (error) { document.body.innerHTML = `<div style="padding:40px;text-align:center;color:red;"><h2>Error</h2><p>${error.toString()}</p></div>`; }
    </script>
</body>
</html>
